services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forkfit
      POSTGRES_PASSWORD: forkfit
      POSTGRES_DB: forkfit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://forkfit:forkfit@postgres:5432/forkfit
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-qwen3.6-flash}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-forkfit}
    depends_on:
      - postgres
      - redis
      - kafka

  worker:
    build: .
    command: python scripts/run_worker.py
    environment:
      DATABASE_URL: postgresql+psycopg://forkfit:forkfit@postgres:5432/forkfit
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-qwen3.6-flash}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-forkfit}
    depends_on:
      - postgres
      - redis
      - kafka

  frontend:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      FORKFIT_API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
