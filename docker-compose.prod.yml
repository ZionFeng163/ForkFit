services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forkfit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forkfit_prod_2026}
      POSTGRES_DB: forkfit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forkfit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-forkfit_redis_2026}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-forkfit_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: backend
    environment:
      DATABASE_URL: postgresql+psycopg://forkfit:${POSTGRES_PASSWORD:-forkfit_prod_2026}@postgres:5432/forkfit
      REDIS_URL: redis://:${REDIS_PASSWORD:-forkfit_redis_2026}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-qwen3.6-flash}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: worker
    environment:
      DATABASE_URL: postgresql+psycopg://forkfit:${POSTGRES_PASSWORD:-forkfit_prod_2026}@postgres:5432/forkfit
      REDIS_URL: redis://:${REDIS_PASSWORD:-forkfit_redis_2026}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-qwen3.6-flash}
      BAILIAN_BASE_URL: ${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: frontend
    environment:
      FORKFIT_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
